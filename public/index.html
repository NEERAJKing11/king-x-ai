<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neeraj King AI - सबसे Powerful Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 🎨 COLORFUL SIDEBAR with LOGO -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="https://image2url.com/r2/default/images/1773386857664-a48d1a84-baad-4462-ac43-52b88b9131f3.png" 
                     alt="Neeraj Logo" class="logo">
                <div class="logo-text">
                    <h2>Neeraj King</h2>
                    <p>AI Assistant</p>
                </div>
            </div>
            <button class="new-chat-btn" id="newChat">
                ➕ नया चैट
            </button>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- 💎 MAIN CHAT -->
        <div class="main-chat">
            <header class="chat-header">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div class="header-title">
                    <span>Neeraj AI Assistant</span>
                    <div class="status-dot"></div>
                </div>
            </header>

            <div class="messages" id="messages"></div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="यहाँ मैसेज लिखें..." />
                    <button id="sendBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
